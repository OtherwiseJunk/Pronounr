name: Publish

# Publishes to npm when a GitHub Release is published, or on manual dispatch.
# Bump the version in package.json and create a GitHub Release first.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing (no npm token needed)
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 24 ships older.
      - run: npm install -g npm@latest

      - run: npm ci
      - run: npm test
      - run: npm run build

      # OIDC supplies auth + provenance automatically — no token, no flags.
      - run: npm publish
